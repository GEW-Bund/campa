{{- $isExternal := or (hasPrefix .Destination "http://") (hasPrefix .Destination "https://") -}}
{{- $isMailto := hasPrefix .Destination "mailto:" -}}
<a href="{{ .Destination | safeURL }}"
   {{- if or $isExternal $isMailto }} target="_blank" rel="noopener noreferrer"{{ end -}}
   {{- with .Title }} title="{{ . }}"{{ end -}}>
  {{- .Text | safeHTML -}}
</a>

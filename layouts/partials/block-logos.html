{{ $block := .block }}
{{ $bg := $block.bg | default "light" }}
{{ $title := $block.title | default "" }}

<div class="section-{{ $bg }}" id="logos">
  <section class="logos-section">
    {{ with $title }}<p class="logos-label">{{ . }}</p>{{ end }}
    <div class="logos-row">
      {{ range $block.items }}
      <img src="{{ .src }}" alt="{{ .alt }}" class="logo-item" loading="lazy" />
      {{ end }}
    </div>
  </section>
  {{ partial "back-to-top.html" . }}
</div>

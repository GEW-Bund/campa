<script>
/* ============================================
   SLIDER — scroll-snap, dots via IntersectionObserver
   ============================================ */
(function () {
  const track = document.getElementById('sliderTrack');
  const dots  = document.querySelectorAll('.slider-dot');
  if (!track || !dots.length) return;

  const slides = Array.from(track.querySelectorAll('.slide'));

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const i = slides.indexOf(entry.target);
        dots.forEach((d, j) => d.classList.toggle('active', i === j));
      }
    });
  }, { root: track, threshold: 0.5 });

  slides.forEach(s => observer.observe(s));

  dots.forEach((dot, i) => {
    dot.addEventListener('click', () => {
      slides[i].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
    });
  });
})();

/* ============================================
   FAQ — unterstützt mehrere Instanzen
   ============================================ */
document.querySelectorAll('.faq-raw').forEach(function (raw) {
  const targetId  = raw.dataset.faqTarget;
  const container = document.querySelector('.faq-container[data-faq-id="' + targetId + '"]');
  if (!container) return;

  const nodes = Array.from(raw.children);
  let items = [];
  let current = null;

  nodes.forEach(function (node) {
    if (node.tagName === 'H3' || node.tagName === 'H4') {
      if (current) items.push(current);
      current = { question: node.textContent.trim(), answerHTML: '' };
    } else if (current) {
      current.answerHTML += node.outerHTML;
    }
  });
  if (current) items.push(current);

  items.forEach(function (item, i) {
    const uid = targetId + '-' + i;
    const el = document.createElement('div');
    el.className = 'faq-item';
    el.innerHTML =
      '<button class="faq-question" aria-expanded="false" aria-controls="faq-answer-' + uid + '">' +
        '<span>' + item.question + '</span>' +
        '<span class="faq-icon" aria-hidden="true">+</span>' +
      '</button>' +
      '<div class="faq-answer" id="faq-answer-' + uid + '" role="region">' +
        item.answerHTML +
      '</div>';

    el.querySelector('.faq-question').addEventListener('click', function () {
      const isOpen = el.classList.contains('open');
      container.querySelectorAll('.faq-item.open').forEach(function (o) {
        o.classList.remove('open');
        o.querySelector('.faq-question').setAttribute('aria-expanded', 'false');
      });
      if (!isOpen) {
        el.classList.add('open');
        el.querySelector('.faq-question').setAttribute('aria-expanded', 'true');
      }
    });

    container.appendChild(el);
  });
});
/* ============================================
   ACCORDION
   ============================================ */
document.querySelectorAll('.accordion-trigger').forEach(function (btn) {
  btn.addEventListener('click', function () {
    const isOpen = btn.getAttribute('aria-expanded') === 'true';
    const body = btn.nextElementSibling;
    btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
    if (isOpen) {
      body.hidden = true;
    } else {
      body.hidden = false;
    }
  });
});
</script>
